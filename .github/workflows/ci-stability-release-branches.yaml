name: ci-stability-release-branches

on:
  workflow_dispatch:
    inputs:
      branch:
        description: >
          If empty, the workflow will run in a mode where it triggers CI runs for all active release branches. 
          If provided, it will trigger a CI run only for the specified branch, but only if it exists in the active-branches.json file 
          and is not the default branch (master).
        required: false
        type: string
  schedule:
    - cron: "0 19 * * *" # Once a day at 19:00 UTC

permissions: {}

concurrency:
  group: ${{ github.workflow }}

jobs:
  get-active-release-branches:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      branches: ${{ steps.get-branches.outputs.branches }}
    steps:
      - name: "Get active branches"
        id: get-branches
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.1.0# v7.1.0
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        with:
          script: |
            const { DEFAULT_BRANCH } = process.env;

            const { data: file } = await github.rest.repos.getContent({
              ...context.repo,
              path: 'active-branches.json',
            });

            const content = Buffer.from(file.content, 'base64').toString('utf-8');
            const activeBranches = JSON.parse(content).filter(branch => branch !== DEFAULT_BRANCH);

            if (!Array.isArray(activeBranches) || activeBranches.length === 0) {
              throw new Error('No active branches to process');
            }

            core.setOutput('branches', activeBranches);

  trigger-branch-runs:
    if: ${{ !inputs.branch }}
    needs: get-active-release-branches
    runs-on: ubuntu-24.04
    permissions:
      actions: write # required to trigger workflows
    steps:
      - name: "Trigger workflows for active release branches"
        id: trigger-branch-runs
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.1.0
        env:
          BRANCHES: ${{ needs.get-active-release-branches.outputs.branches }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        with:
          script: |
            const { BRANCHES, DEFAULT_BRANCH } = process.env;
            const branches = JSON.parse(BRANCHES);
            const workflowId = 'ci-stability-release-branches.yaml';

            for (const branch of branches) {
              console.log(`Triggering workflow '${workflowId}' for branch: ${branch}`);
  
              await github.rest.actions.createWorkflowDispatch({
                ...context.repo,
                workflow_id: workflowId,
                ref: DEFAULT_BRANCH,
                inputs: { branch }
              });
            }

  trigger-build-test-distribute:
    if: contains(fromJSON(needs.get-active-release-branches.outputs.branches), inputs.branch)
    needs: get-active-release-branches
    runs-on: ubuntu-24.04
    permissions:
      actions: write # required to trigger workflows
    outputs:
      run-id: ${{ steps.get-run-id.outputs.id }}
    env:
      BRANCH: ${{ needs.get-active-release-branches.outputs.branch }}
    steps:
      - name: "Check if branch exists"
        id: check-branch
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.1.0
        with:
          script: |
            const { BRANCH } = process.env;

            try {
              await github.rest.repos.getBranch({ ...context.repo, branch: BRANCH });
              console.log(`Branch '${BRANCH}' exists`);
              return core.setOutput('exists', true);
            } catch (error) {
              if (error.status !== 404) {
                throw error; // Unexpected error
              }
            }
            
            console.log(`Branch '${BRANCH}' does not exist`);
            core.setOutput('exists', false);

            await core.summary
              .addHeading("Job Skipped")
              .addRaw(`Branch '${BRANCH}' does not exist. Skipping the rest of the job`)
              .write();

      - name: "Trigger the workflow"
        if: steps.check-branch.outputs.exists == 'true'
        id: trigger-workflow
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.1.0
        with:
          script: |
            const { BRANCH } = process.env;
            const workflowToTrigger = 'build-test-distribute.yaml';

            const started = new Date().toISOString();

            await github.rest.actions.createWorkflowDispatch({
              ...context.repo,
              workflow_id: workflowToTrigger,
              ref: BRANCH,
            });

            const finished = new Date(new Date().getTime() + 10 * 1000).toISOString();

            console.log(`Triggered workflow '${workflowToTrigger}' for branch ${BRANCH}`);

            core.setOutput('started', started);
            core.setOutput('finished', finished);

      - name: "Retrieve workflow run ID"
        if: steps.check-branch.outputs.exists == 'true'
        id: get-run-id
        env:
          STARTED: ${{ steps.trigger-workflow.outputs.started }}
          FINISHED: ${{ steps.trigger-workflow.outputs.finished }}
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.1.0
        with:
          script: |
            const { BRANCH, STARTED, FINISHED } = process.env;
            const workflowId = 'build-test-distribute.yaml';

            const maxRetries = 5;
            let retryCount = 0;
            let runId = null;

            while (retryCount < maxRetries && !runId) {
              console.log(`Checking for workflow run (attempt ${retryCount + 1})...`);

              const { data: runs } = await github.rest.actions.listWorkflowRuns({
                ...context.repo,
                workflow_id: workflowId,
                branch: BRANCH,
                created: `${STARTED}..${FINISHED}`,
                per_page: 1,
              });

              if (runs.workflow_runs.length > 0) {
                runId = runs.workflow_runs[0].id;
              }

              if (!runId) {
                retryCount++;
                await new Promise(resolve => setTimeout(resolve, 5000));
              }
            }

            if (!runId) {
              throw new Error(`Unable to retrieve run ID after ${maxRetries} retries.`);
            }

            console.log(`Retrieved run ID: ${runId}`);

            core.setOutput('id', runId);

  monitor-triggered-workflow:
    needs: trigger-build-test-distribute
    runs-on: ubuntu-24.04
    timeout-minutes: 115
    permissions:
      actions: read
      checks: read
    env:
      RUN_ID: ${{ needs.trigger-build-test-distribute.outputs.run-id }}
    steps:
      - name: "Monitor triggered workflow"
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.1.0
        with:
          script: |
            const { RUN_ID } = process.env;
            
            while (true) {
              const response = await github.rest.actions.listJobsForWorkflowRun({
                ...context.repo,
                run_id: RUN_ID,
              });
              
              const { jobs } = response.data;

              console.table(
                jobs.map(job => {
                  const finishedSteps = job.steps.filter(s => s.conclusion).length;
                  const totalSteps = job.steps.length;

                  return {
                    Job: job.name,
                    Status: job.status,
                    Steps: `${finishedSteps}/${totalSteps}`,
                    Conclusion: job.conclusion || 'in_progress',
                  };
                })
              );

              if (jobs.every(job => job.conclusion !== null)) {
                console.log('All jobs completed');
                break;
              }

              await new Promise(resolve => setTimeout(resolve, 60000));
            }
